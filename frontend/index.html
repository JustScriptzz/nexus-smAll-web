<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus SmAll v1</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center justify-center p-6">
  <div class="max-w-lg text-center space-y-6">
    <div class="space-y-2">
      <h1 class="text-4xl font-bold">
        Nexus <span class="text-purple-400">SmAll</span>
        <span class="text-2xl text-gray-500 font-normal">v1</span>
      </h1>
      <p class="text-gray-500">89.8M parameter transformer — built from scratch</p>
    </div>

    <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800 space-y-4">
      <p class="text-sm text-gray-400">Click below to try the model live:</p>
      <a href="https://try-nexus-ai.streamlit.app"
         class="inline-block bg-purple-600 hover:bg-purple-500 text-white font-semibold px-8 py-3 rounded-xl transition-colors text-lg">
        Open Chat →
      </a>
    </div>

    <div class="grid grid-cols-2 gap-3 text-xs text-gray-600">
      <div class="bg-gray-900 rounded-xl p-3 border border-gray-800">
        <div class="font-medium text-gray-400">Architecture</div>
        <div class="mt-1 space-y-0.5">
          <div>10 layers · 768 hidden</div>
          <div>GQA · SwiGLU · RoPE</div>
        </div>
      </div>
      <div class="bg-gray-900 rounded-xl p-3 border border-gray-800">
        <div class="font-medium text-gray-400">Training</div>
        <div class="mt-1 space-y-0.5">
          <div>100k steps WikiText-103</div>
          <div>5k steps instruction FT</div>
        </div>
      </div>
    </div>

    <div class="flex gap-2 justify-center text-xs">
      <a href="https://github.com/JustScriptzz/nexus-smAll-web" class="text-gray-600 hover:text-gray-400">GitHub</a>
      <span class="text-gray-700">·</span>
      <a href="https://huggingface.co/JustScriptzz/nexus-smAll-v1" class="text-gray-600 hover:text-gray-400">HuggingFace</a>
    </div>
  </div>
</body>
</html>
